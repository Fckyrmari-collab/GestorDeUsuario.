<!DOCTYPE html>
<html>
<head>
    <title>Editar Empleado</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center text-warning">Editar Empleado</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/actualizar_empleado">

            <input type="hidden" name="id" value="{{ empleado[0] }}">

            <label class="form-label">Documento</label>
            <input type="number" name="documento" class="form-control mb-2" value="{{ empleado[1] }}" required>

            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control mb-2" value="{{ empleado[2] }}" required>

            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-control mb-2" value="{{ empleado[3] }}" required>

            <label class="form-label">Cargo</label>
            <input type="text" name="cargo" class="form-control mb-2" value="{{ empleado[4] }}" required>

            <label class="form-label">Salario</label>
            <input type="number" step="0.01" name="salario" class="form-control mb-2" value="{{ empleado[5] }}" required>

            <label class="form-label">Horas Extras</label>
            <input type="number" name="horas_extras" class="form-control mb-2" value="{{ empleado[6] }}">

            <label class="form-label">Bonificación</label>
            <input type="number" step="0.01" name="bonificacion" class="form-control mb-2" value="{{ empleado[7] }}">

            <label class="form-label">Área / Departamento</label>
            <select name="id_area" class="form-control mb-3" required>
                {% for area in areas %}
                    <option value="{{ area[0] }}" {% if area[0] == empleado[11] %}selected{% endif %}>
                        {{ area[1] }}
                    </option>
                {% endfor %}
            </select>

            <button class="btn btn-warning w-100">Actualizar</button>
            <a href="/inicio" class="btn btn-secondary w-100 mt-2">Volver</a>

        </form>

    </div>
</div>

</body>
</html>
